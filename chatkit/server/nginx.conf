# ──────────────────────────────────────────────────────────────────────────────
# Hermes Engine — Nginx Reverse Proxy Configuration
#
# Features:
#   • Reverse proxy to Node.js (port 8080)
#   • WebSocket upgrade for Socket.IO (/socket.io/)
#   • Gzip compression for text-based responses
#   • Rate limiting (30 req/s per IP, burst 50)
#   • Security headers (X-Frame-Options, X-Content-Type-Options, etc.)
#   • Static file caching headers
#   • Connection pooling with upstream keepalives
#   • Request body size limit aligned with multer (50MB)
#
# Usage:
#   Development: nginx -c /path/to/nginx.conf
#   Production:  Copy to /etc/nginx/sites-available/ and symlink
#
# If SSL is handled upstream (Cloudflare, AWS ALB), use this as-is.
# If nginx should terminate SSL, uncomment the SSL section below.
# ──────────────────────────────────────────────────────────────────────────────

# ── Rate limiting zone ─────────────────────────────────────────────────────────
# 10m shared memory zone ≈ ~160,000 IP addresses
# 30 requests/second per IP, burst queue of 50
limit_req_zone $binary_remote_addr zone=hermes_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=hermes_upload:10m rate=5r/s;

# ── Upstream pool ──────────────────────────────────────────────────────────────
upstream hermes_backend {
    server 127.0.0.1:8080;

    # Keepalive connections reduce TCP handshake overhead
    keepalive 64;
    keepalive_timeout 60s;
}

server {
    listen 80;
    server_name _;  # Replace with your domain in production

    # ── SSL (uncomment for nginx-terminated HTTPS) ─────────────────────────
    # listen 443 ssl http2;
    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Request body size (matches multer 50MB limit) ──────────────────────
    client_max_body_size 50m;

    # ── Gzip compression ───────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        application/x-javascript;

    # ── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"       always;
    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-XSS-Protection         "1; mode=block"    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # Prevent nginx version leak
    server_tokens off;

    # ── Socket.IO — WebSocket upgrade ──────────────────────────────────────
    # Socket.IO uses /socket.io/ path by default
    location /socket.io/ {
        proxy_pass http://hermes_backend;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for WebSocket connections (10 min)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # No buffering for real-time data
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Hermes API routes ──────────────────────────────────────────────────
    location /hermes/ {
        # Rate limiting: 30 req/s with burst queue
        limit_req zone=hermes_api burst=50 nodelay;

        proxy_pass http://hermes_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── File upload endpoint — stricter rate limit ─────────────────────────
    location /hermes/upload {
        limit_req zone=hermes_upload burst=10 nodelay;

        proxy_pass http://hermes_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Longer timeout for large uploads
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Health check — no rate limiting ────────────────────────────────────
    location = /hermes/health {
        proxy_pass http://hermes_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;

        # Cache health responses briefly
        proxy_cache_valid 200 3s;
    }

    # ── All other routes (auth, API, etc.) ─────────────────────────────────
    location / {
        limit_req zone=hermes_api burst=30 nodelay;

        proxy_pass http://hermes_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ── Error pages ────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
